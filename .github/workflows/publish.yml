name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install root deps
        run: npm install

      - name: Run tests
        run: node --test test/*.test.js

      # Idempotent: skip if this version is already on the registry, so a
      # re-tag or a re-run does not hard-fail on "cannot publish over
      # existing version". Fresh versions publish normally.
      - name: Publish jd-intel (library + CLI)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "jd-intel@$VERSION" version > /dev/null 2>&1; then
            echo "jd-intel@$VERSION already published, skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # mcp depends on jd-intel@^0.5.0; it must exist on the registry
      # before mcp's npm install can resolve it. Poll until the registry
      # serves this exact version (propagation is usually seconds).
      - name: Wait for jd-intel to be resolvable on npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Waiting for jd-intel@$VERSION on the registry..."
          for i in $(seq 1 30); do
            if npm view "jd-intel@$VERSION" version > /dev/null 2>&1; then
              echo "jd-intel@$VERSION is available."
              exit 0
            fi
            echo "Attempt $i: not yet available, retrying in 10s..."
            sleep 10
          done
          echo "Timed out waiting for jd-intel@$VERSION on the registry." >&2
          exit 1

      - name: Install mcp deps
        run: npm install
        working-directory: mcp

      - name: Publish jd-intel-mcp (MCP server)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "jd-intel-mcp@$VERSION" version > /dev/null 2>&1; then
            echo "jd-intel-mcp@$VERSION already published, skipping."
          else
            npm publish --access public
          fi
        working-directory: mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag pushes only: cut (or update) the GitHub Release with
      # auto-generated notes. workflow_dispatch (no tag) skips this.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
